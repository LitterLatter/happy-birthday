<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Mai ✨</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(-45deg,#1e1e2f,#302b63,#24243e);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
    color:white;
    text-align:center;
    overflow-x:hidden;
    transition:1s;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.memoryMode{
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

/* Intro */
.intro{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    animation:fadeOut 4s forwards 3s;
    z-index:999;
}

@keyframes fadeOut{
    to{opacity:0; visibility:hidden;}
}

h1{ margin-top:40px; }

/* Gallery */
.gallery{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    margin-top:20px;
    transition:1s;
}

.blur{ filter:blur(4px); }

.gallery img{
    width:140px;
    height:180px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

/* Button */
button{
    margin-top:20px;
    padding:12px 30px;
    border-radius:25px;
    border:none;
    background:white;
    color:#302b63;
    font-weight:bold;
    cursor:pointer;
}

/* Candle */
.cake{
    font-size:60px;
    margin-top:20px;
    display:none;
    cursor:pointer;
}
.blown{
    opacity:0.4;
}

/* Wish */
#message,#wishBox{
    display:none;
    margin-top:20px;
}

input{
    padding:10px;
    width:60%;
    border-radius:20px;
    border:none;
}

/* Star */
.star{
    position:fixed;
    font-size:35px;
    left:50%;
    top:60%;
    transform:translate(-50%,-50%);
    animation:fly 3s forwards;
}

@keyframes fly{
    0%{top:60%; left:50%; opacity:1;}
    40%{top:10%; left:50%;}
    80%{top:85%; left:90%;}
    100%{top:85%; left:90%; opacity:0;}
}

/* Gift */
.gift{
    position:fixed;
    bottom:20px;
    right:20px;
    font-size:70px;
    transition:1s;
    pointer-events:none;
}
.zoom{
    transform:scale(4);
    bottom:50%;
    right:45%;
}

/* Glow */
.glow{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:200px;
    height:200px;
    background:radial-gradient(circle, rgba(255,255,200,0.9) 0%, rgba(255,255,200,0.4) 40%, transparent 70%);
    border-radius:50%;
    opacity:0;
    animation:shine 1.5s forwards;
}
@keyframes shine{
    from{opacity:0;}
    to{opacity:1;}
}

/* Paper */
.paper{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,20%) scale(0);
    background:white;
    color:#302b63;
    padding:30px;
    width:320px;
    border-radius:15px;
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
    transition:1s;
    font-weight:bold;
    z-index:10;
}
.showPaper{
    transform:translate(-50%,-50%) scale(1);
}

/* Confetti */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    top:-10px;
    animation:fall linear forwards;
}
@keyframes fall{
    to{transform:translateY(110vh);}
}

/* Ending */
#ending{
    position:fixed;
    bottom:40px;
    width:100%;
    opacity:0;
    transition:2s;
}
.showEnding{ opacity:1; }

/* ===== CONSTELLATION ADD ===== */
#starScene{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    z-index:9999;
}

#starCanvas{
    position:absolute;
    top:0;
    left:0;
}

.star-dot{
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
}
</style>
</head>

<body>

<div class="intro">
    Selamat Ulang Tahun Umaiii 🎉
</div>

<h1>Happy Birthday Mai ✨</h1>

<div class="gallery" id="gallery">
    <img src="umai1.jpeg">
    <img src="umai2.jpeg">
    <img src="umai3.jpeg">
    <img src="umai4.jpeg">
    <img src="umai5.jpeg">
</div>

<button id="openBtn">Open Message</button>

<div id="message">Make a wish and blow the candle 🕯</div>

<div class="cake" id="cake">🎂🕯</div>

<div id="wishBox">
    <input type="text" id="wishInput" placeholder="Type your wish here...">
    <br><br>
    <button id="wishBtn">Make Wish ⭐</button>
</div>

<div class="gift" id="gift">🎁</div>

<div class="paper" id="paper">
    <div id="typedText"></div>
    <br><br>
    <button id="nextSceneBtn">Next ✨</button>
</div>

<div id="ending">
    Thank you for being part of my life 💖
</div>

<!-- CONSTELLATION SCENE -->
<div id="starScene">
    <canvas id="starCanvas"></canvas>
    <div id="starText" style="position:absolute; bottom:50px; width:100%; text-align:center; color:white; opacity:0; transition:2s;">
        Touch the stars...
    </div>
</div>

<script>

const openBtn=document.getElementById("openBtn");
const wishBtn=document.getElementById("wishBtn");
const cake=document.getElementById("cake");

openBtn.addEventListener("click",function(){
    document.getElementById("message").style.display="block";
    cake.style.display="block";
});

cake.addEventListener("click",function(){
    cake.classList.add("blown");
    document.getElementById("wishBox").style.display="block";
});

wishBtn.addEventListener("click",function(){

    let wish=document.getElementById("wishInput").value;
    if(wish.trim()===""){
        alert("Please write your wish first 💫");
        return;
    }

    wishBtn.disabled=true;

    let star=document.createElement("div");
    star.className="star";
    star.innerHTML="⭐";
    document.body.appendChild(star);

    setTimeout(()=>{
        star.remove();
        document.getElementById("gift").classList.add("zoom");

        let glow=document.createElement("div");
        glow.className="glow";
        document.body.appendChild(glow);

        setTimeout(()=>{
            document.body.classList.add("memoryMode");
            document.getElementById("gallery").classList.add("blur");
            document.getElementById("paper").classList.add("showPaper");
            typeWriter();

            setTimeout(()=>{
                glow.remove();
                createConfetti();
            },1500);

        },1000);

    },3000);

});

function typeWriter(){
    const text="Hadiah tu sila mintak dengan Mimie 🤍\n\nSekian terima kasih yang benar Azim ✨";
    let i=0;
    let speed=40;
    const target=document.getElementById("typedText");
    target.innerHTML="";

    function typing(){
        if(i<text.length){
            target.innerHTML += text.charAt(i)==="\n" ? "<br>" : text.charAt(i);
            i++;
            setTimeout(typing,speed);
        } else {
            setTimeout(()=>{
                document.getElementById("ending").classList.add("showEnding");
            },2000);
        }
    }
    typing();
}

function createConfetti(){
    for(let i=0;i<80;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*window.innerWidth+"px";
        c.style.backgroundColor=["#ff4d6d","#ffd166","#06d6a0","#118ab2"][Math.floor(Math.random()*4)];
        c.style.animationDuration=(Math.random()*3+3)+"s";
        document.body.appendChild(c);
        setTimeout(()=>{c.remove();},5000);
    }
}

/* ===== CONSTELLATION SCRIPT ===== */

const nextSceneBtn=document.getElementById("nextSceneBtn");
const starScene=document.getElementById("starScene");
const starCanvas=document.getElementById("starCanvas");
const starText=document.getElementById("starText");
const ctx=starCanvas.getContext("2d");

starCanvas.width=window.innerWidth;
starCanvas.height=window.innerHeight;

let constellationPoints=[
    // Kotak bawah
    {x:350,y:300},
    {x:450,y:300},
    {x:450,y:380},
    {x:350,y:380},
    {x:350,y:300},

    // Reben tengah vertical
    {x:400,y:300},
    {x:400,y:380},

    // Reben atas horizontal
    {x:350,y:340},
    {x:450,y:340},

    // Bow kiri
    {x:370,y:280},
    {x:400,y:300},

    // Bow kanan
    {x:430,y:280},
    {x:400,y:300}

    

    
];




nextSceneBtn.addEventListener("click",function(){
    starScene.style.display="block";
    generateStars();
});

function generateStars(){
    for(let i=0;i<40;i++){
        let star=document.createElement("div");
        star.className="star-dot";
        star.style.left=Math.random()*window.innerWidth+"px";
        star.style.top=Math.random()*window.innerHeight*0.7+"px";
        starScene.appendChild(star);
    }
    setTimeout(()=>{
        starText.style.opacity="1";
    },1000);
}

starScene.addEventListener("click",function(){

    ctx.clearRect(0,0,starCanvas.width,starCanvas.height);
    ctx.strokeStyle="white";
    ctx.lineWidth=1.5;

    ctx.beginPath();
    ctx.moveTo(constellationPoints[0].x,constellationPoints[0].y);
    for(let i=1;i<constellationPoints.length;i++){
        ctx.lineTo(constellationPoints[i].x,constellationPoints[i].y);
    }
    ctx.stroke();

    starText.style.opacity="1";
    starText.style.fontSize="40px";
    starText.style.fontWeight="bold";
    starText.innerHTML="Happy Birthday Umairahh ✨";
});

</script>

</body>

</html>
